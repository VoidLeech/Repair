modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"
issueTrackerURL="${homepage}/issues"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
#updateJSONURL="https://raw.githubusercontent.com/VoidLeech/vl-mod-versioning/main/${mod_id}.json"
displayURL="${homepage}"
logoFile="icon.png"
credits="Creators of Create & their contributors for the bugfixes we can then backport."
authors="${mod_authors}"
description='''${mod_description}'''

[[dependencies."${mod_id}"]]
    modId="forge"
    mandatory=true
    versionRange="${forge_version_range}"
    ordering="NONE"
    side="BOTH"
[[dependencies."${mod_id}"]]
    modId="minecraft"
    mandatory=true
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"
[[dependencies."${mod_id}"]]
    modId = "create"
    mandatory = true
    versionRange = "${create_version}"
    ordering = "NONE"
    side = "BOTH"
